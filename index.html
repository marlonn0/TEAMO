<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nathy, mi cachetoncita ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* Fondo de noche estrellada */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100dvh; /* TRUCO MÁGICO: Evita que el navegador del celular corte la parte de abajo */
            background: linear-gradient(to bottom, #020111 0%, #20124d 100%);
            overflow: hidden;
            font-family: 'Pacifico', cursive;
            position: relative;
        }

        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out alternate;
        }

        .star:nth-child(1) { top: 15%; left: 15%; width: 3px; height: 3px; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; left: 80%; width: 2px; height: 2px; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 40%; left: 10%; width: 4px; height: 4px; animation-delay: 1s; }
        .star:nth-child(4) { top: 10%; left: 50%; width: 2px; height: 2px; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 60%; left: 70%; width: 3px; height: 3px; animation-delay: 0.8s; }
        .star:nth-child(6) { top: 30%; left: 35%; width: 2px; height: 2px; animation-delay: 0.2s; }
        .star:nth-child(7) { top: 55%; left: 90%; width: 3px; height: 3px; animation-delay: 1.2s; }
        .star:nth-child(8) { top: 75%; left: 20%; width: 2px; height: 2px; animation-delay: 0.7s; }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px white; }
        }

        .shooting-star {
            position: absolute;
            top: 0;
            left: 0;
            width: 150px;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
            transform: rotate(35deg);
            animation: shoot 6s infinite linear;
            z-index: 1;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            width: 10px; 
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px white;
        }

        @keyframes shoot {
            0% { transform: translate(10vw, -20vh) rotate(35deg); opacity: 1; }
            25% { transform: translate(120vw, 80vh) rotate(35deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* FOTOS (Configuración base para PC) */
        .corner-photo {
            position: absolute;
            width: 150px; 
            height: 150px;
            object-fit: cover; 
            border-radius: 20px; 
            border: 5px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); 
            z-index: 10;
            opacity: 0; 
            animation: fadeInPhotos 2s 3.5s forwards; 
            transition: transform 0.3s ease; 
        }

        .top-left { top: 20px; left: 20px; transform: rotate(-5deg); }
        .top-right { top: 20px; right: 20px; transform: rotate(5deg); }
        .bottom-left { bottom: 20px; left: 20px; transform: rotate(5deg); }
        .bottom-right { bottom: 20px; right: 20px; transform: rotate(-5deg); }

        .corner-photo:hover {
            transform: scale(1.1) rotate(0deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            z-index: 20;
        }

        @keyframes fadeInPhotos {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* TULIPÁN (Configuración base para PC) */
        .tulip-wrapper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            animation: growTulip 4s ease-out forwards;
            z-index: 5;
        }

        @keyframes growTulip {
            0% { transform: translateX(-50%) scale(0); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .stem {
            width: 8px;
            height: 180px;
            background: #2d6a4f;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
        }

        .leaf {
            width: 50px;
            height: 80px;
            background: #40916c;
            position: absolute;
            bottom: 30px;
            border-radius: 0 100% 0 100%;
        }

        .leaf.left { left: 50%; transform: translateX(-110%) rotate(-30deg); }
        .leaf.right { left: 50%; transform: translateX(10%) rotate(30deg) scaleX(-1); }

        .flower {
            width: 60px;
            height: 80px;
            background: #ff4d6d;
            border-radius: 40% 40% 20% 20%;
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -10px 0 15px rgba(0,0,0,0.15);
        }

        .flower::before, .flower::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: #ff4d6d;
            border-radius: 40% 40% 20% 20%;
            top: 0;
        }

        .flower::before { left: -20px; transform: rotate(-15deg); background: #ff758f; z-index: -1; }
        .flower::after { right: -20px; transform: rotate(15deg); background: #ff758f; z-index: -1; }

        /* TEXTO (Configuración base para PC) */
        .message {
            position: absolute;
            top: 25%; 
            width: 100%;
            text-align: center;
            color: #fff0f3;
            font-size: 2.2rem; 
            line-height: 1.4; 
            text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
            opacity: 0;
            animation: fadeInText 3s 3.5s forwards;
            z-index: 15;
            margin: 0;
            padding: 0 180px; 
            box-sizing: border-box;
        }

        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 📱 ¡AQUÍ ESTÁ LA MAGIA PARA EL CELULAR! 📱 */
        @media (max-width: 600px) {
            .message {
                font-size: 1.4rem; /* Letra un poco más pequeña */
                padding: 0 15px; /* Menos espacio a los lados */
                top: 18%; /* Texto un poco más arriba */
                line-height: 1.3;
            }
            .corner-photo {
                width: 75px; /* Fotos más pequeñas para que no estorben */
                height: 75px;
                border-width: 3px;
                border-radius: 12px;
            }
            
            /* Acomodamos las fotos para que no se corten */
            .top-left { top: 25px; left: 15px; }
            .top-right { top: 25px; right: 15px; }
            /* ¡Subimos las fotos de abajo para que se vean bien! */
            .bottom-left { bottom: 40px; left: 15px; }
            .bottom-right { bottom: 40px; right: 15px; }

            /* Ajustamos el Tulipán para que quede perfecto en medio */
            .tulip-wrapper {
                /* Cambiamos la animación para que use la de celular */
                animation: growTulipMobile 4s ease-out forwards;
            }

            @keyframes growTulipMobile {
                /* Lo hacemos un poco más pequeño (scale 0.75) y lo subimos (bottom 12%) */
                0% { transform: translateX(-50%) scale(0); bottom: 12%; }
                100% { transform: translateX(-50%) scale(0.75); bottom: 12%; } 
            }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <div class="shooting-star"></div>

    <img src="foto_1.jpg" alt="Foto" class="corner-photo top-left">
    <img src="foto_2.jpg" alt="Foto" class="corner-photo top-right">
    <img src="foto_3.jpg" alt="Foto" class="corner-photo bottom-left">
    <img src="foto_4.jpg" alt="Foto" class="corner-photo bottom-right">

    <div class="tulip-wrapper">
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="stem"></div>
        <div class="flower"></div>
    </div>

    <h1 class="message">Te amo mi corazón de melón, te amo mucho mi Nathy bonita, mi cachetoncita hermosa</h1>

</body>
</html>
